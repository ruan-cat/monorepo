name: Setup Monorepo

description: |
  统一安装 pnpm、Node、全局工具与项目依赖。
  供 release.yml、ci.yaml 等需要执行 build 的工作流复用。

inputs:
  node-version:
    description: Node.js 版本
    required: false
    default: "24.18.0"
  registry-url:
    description: npm registry URL
    required: false
    default: "https://registry.npmjs.org"
  with-vercel:
    description: 是否全局安装 vercel CLI
    required: false
    default: "true"
  with-npm:
    description: 是否全局安装 npm（release 流程需要）
    required: false
    default: "false"

runs:
  using: composite
  steps:
    # 标准顺序：先安装 pnpm，再让 setup-node 识别 pnpm 缓存
    - name: 安装pnpm
      uses: pnpm/action-setup@v5
      with:
        run_install: false

    - name: 安装node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - name: corepack手动再安装一次pnpm
      shell: bash
      run: corepack enable && corepack install

    # 全局安装 CI 所需的工具（与项目依赖隔离，避免污染 install 参数）
    - name: 全局安装CI工具
      shell: bash
      run: |
        GLOBAL_TOOLS="@dotenvx/dotenvx tsx turbo"
        if [ "${{ inputs.with-vercel }}" = "true" ]; then
          GLOBAL_TOOLS="$GLOBAL_TOOLS vercel"
        fi
        if [ "${{ inputs.with-npm }}" = "true" ]; then
          GLOBAL_TOOLS="$GLOBAL_TOOLS npm"
        fi
        pnpm add -g $GLOBAL_TOOLS

    - name: 安装整个项目的依赖
      shell: bash
      run: pnpm i

    # 诊断：确认 consola package.json 与补丁状态
    - name: 诊断consola解析状态
      shell: bash
      run: |
        echo "=== 根目录 consola package.json ==="
        ls -la ./node_modules/consola || true
        echo "=== consola main 字段 ==="
        node -e "console.log(require('./node_modules/consola/package.json').main)" || true
        echo "=== consola exports 字段 ==="
        node -e "console.log(JSON.stringify(require('./node_modules/consola/package.json').exports, null, 2))" || true
        echo "=== utils 包 consola package.json ==="
        node -e "console.log(JSON.stringify(require('./packages/utils/node_modules/consola/package.json').exports?.['.'], null, 2))" || true
        echo "=== automd 入口 ==="
        ls -la ./node_modules/.pnpm/automd@*/node_modules/automd/dist/cli.mjs || true
