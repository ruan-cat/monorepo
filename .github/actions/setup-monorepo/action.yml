name: Setup Monorepo

description: |
  统一安装 pnpm、Node、全局工具与项目依赖，并在 build 前兜底修复 consola ESM 垫片。
  供 release.yml、ci.yaml 等需要执行 build 的工作流复用。

inputs:
  node-version:
    description: Node.js 版本
    required: false
    default: "24.18.0"
  registry-url:
    description: npm registry URL
    required: false
    default: "https://registry.npmjs.org"
  with-vercel:
    description: 是否全局安装 vercel CLI
    required: false
    default: "true"
  with-npm:
    description: 是否全局安装 npm（release 流程需要）
    required: false
    default: "false"

runs:
  using: composite
  steps:
    # 标准顺序：先安装 pnpm，再让 setup-node 识别 pnpm 缓存
    - name: 安装pnpm
      uses: pnpm/action-setup@v5
      with:
        run_install: false

    - name: 安装node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - name: corepack手动再安装一次pnpm
      shell: bash
      run: corepack enable && corepack install

    # 全局安装 CI 所需的工具（与项目依赖隔离，避免污染 install 参数）
    - name: 全局安装CI工具
      shell: bash
      run: |
        GLOBAL_TOOLS="@dotenvx/dotenvx tsx turbo"
        if [ "${{ inputs.with-vercel }}" = "true" ]; then
          GLOBAL_TOOLS="$GLOBAL_TOOLS vercel"
        fi
        if [ "${{ inputs.with-npm }}" = "true" ]; then
          GLOBAL_TOOLS="$GLOBAL_TOOLS npm"
        fi
        pnpm add -g $GLOBAL_TOOLS

    - name: 安装整个项目的依赖
      shell: bash
      run: pnpm i

    # 诊断：确认 consola 垫片是否存在（用于排查 ERR_MODULE_NOT_FOUND）
    - name: 诊断consola垫片状态
      shell: bash
      run: |
        echo "=== 根目录 consola ==="
        ls -la ./node_modules/consola || true
        test -f ./node_modules/consola/index.js && echo "根 consola/index.js 存在" || echo "根 consola/index.js 不存在"
        echo "=== utils 包 consola ==="
        ls -la ./packages/utils/node_modules/consola || true
        test -f ./packages/utils/node_modules/consola/index.js && echo "utils consola/index.js 存在" || echo "utils consola/index.js 不存在"
        echo "=== automd 依赖的 consola ==="
        ls -la ./node_modules/.pnpm/automd@*/node_modules/consola || true
        test -f ./node_modules/.pnpm/automd@*/node_modules/consola/index.js && echo "automd consola/index.js 存在" || echo "automd consola/index.js 不存在"
        echo "=== automd 入口 ==="
        ls -la ./node_modules/.pnpm/automd@*/node_modules/automd/dist/cli.mjs || true

    # 兜底：显式修复 consola ESM 垫片（兼容 postinstall 未触发或被缓存跳过的场景）
    - name: 修复consola ESM垫片
      shell: bash
      run: pnpm exec tsx scripts/fix-consola-esm.ts
