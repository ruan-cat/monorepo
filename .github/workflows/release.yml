name: Release

# 该文件的文件名和后缀名与 npm 的 OIPC 配置高度耦合
# npm 的可信任发布 高度耦合该文件，所以不能随意修改

env:
  # https://turborepo.com/docs/crafting-your-repository/constructing-ci#enabling-remote-caching
  # https://vercel.com/docs/monorepos/remote-caching#use-remote-caching-from-external-ci/cd
  TURBO_TOKEN: ${{ secrets.vercel_token }}
  TURBO_TEAM: "ruancat-projects"

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 标准顺序：先安装 pnpm，再让 setup-node 识别 pnpm 缓存
      - name: 安装pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: 安装node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: corepack手动再安装一次pnpm
        run: corepack enable && corepack install

      # 全局安装 CI 所需的工具（与项目依赖隔离，避免污染 install 参数）
      - name: 全局安装CI工具
        run: pnpm add -g vercel @dotenvx/dotenvx tsx turbo npm

      - name: 安装整个项目的依赖
        run: pnpm i

      # 诊断：确认 consola 垫片是否存在（用于排查 ERR_MODULE_NOT_FOUND）
      - name: 诊断consola垫片状态
        run: |
          echo "=== 根目录 consola ==="
          ls -la ./node_modules/consola || true
          test -f ./node_modules/consola/index.js && echo "根 consola/index.js 存在" || echo "根 consola/index.js 不存在"
          echo "=== utils 包 consola ==="
          ls -la ./packages/utils/node_modules/consola || true
          test -f ./packages/utils/node_modules/consola/index.js && echo "utils consola/index.js 存在" || echo "utils consola/index.js 不存在"
          echo "=== automd 入口 ==="
          ls -la ./node_modules/.pnpm/automd@*/node_modules/automd/dist/cli.mjs || true

      # 兜底：显式修复 consola ESM 垫片（兼容 postinstall 未触发或被缓存跳过的场景）
      - name: 修复consola ESM垫片
        run: pnpm exec tsx scripts/fix-consola-esm.ts

      - name: turbo login 远程登录
        run: turbo login --token=${{env.TURBO_TOKEN}} --team=${{env.TURBO_TEAM}}

      - name: turbo link 链接远程项目
        run: turbo link --token=${{env.TURBO_TOKEN}} --scope=${{env.TURBO_TEAM}} --yes

      - name: 在 .npmrc 内写入token
        run: |
          cat << EOF > "$HOME/.npmrc"
            //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 构建项目
        run: pnpm run build

      - name: 安装全局的最新npm包
        run: npm install -g npm@latest

      - name: 构建并发版
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm run version
          commit: "📢 publish: release package(s)"
          title: "📢 publish: release package(s)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 触发部署工作流
        if: steps.changesets.outputs.published == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: deploy-after-release
          client-payload: |
            {
              "published": true,
              "publishedPackages": ${{ toJson(steps.changesets.outputs.publishedPackages) }},
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
